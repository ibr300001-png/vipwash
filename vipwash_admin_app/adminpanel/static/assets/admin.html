<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>VIP Wash — الإدارة</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <div class="row">
      <span class="badge">ADMIN</span>
      <div class="row">
        <button id="btnLang" class="badge sm">EN</button>
        <button id="btnTheme" class="badge sm">☀️/🌙</button>
        <button id="btnSettings" class="badge sm">⚙️</button>
        <a class="badge sm" href="/admin">خروج</a>
      </div>
    </div>
  </div>
  <div class="container">
    <div class="logo"><img src="logo.png"><h1>VIP Wash</h1></div>

    <div class="section card">
      <div class="title"><h2>قراءة باركود</h2><button id="btnManualInfo" class="btn ghost sm">إرشادات</button></div>
      <div class="stack">
        <video id="video" playsinline></video>
        <div class="row">
          <button id="btnScan" class="btn">ابدأ المسح</button>
          <button id="btnStop" class="btn ghost">إيقاف</button>
        </div>
        <div class="row">
          <input id="manualToken" class="input" placeholder="إدخال يدوي (TOKEN)">
          <button id="btnManual" class="btn secondary">اعتماد</button>
        </div>
        <div id="scanOut" class="notice" style="display:none"></div>
      </div>
    </div>

    <div class="section card">
      <div class="title"><h2>الإحصائيات</h2><button id="btnExport" class="btn ghost sm">تصدير PDF</button></div>
      <div class="stack" id="stats"></div>
    </div>

    <div class="section card">
      <div class="title"><h2>التنبيهات</h2><button id="btnRefreshAlerts" class="btn ghost sm">تحديث</button></div>
      <div id="alerts" class="stack"></div>
    </div>

    <div class="section card">
      <div class="title"><h2>العملاء</h2></div>
      <div class="stack">
        <div class="search">
          <input id="q" class="input" placeholder="بحث بالاسم/الجوال/اللوحة">
          <button id="btnReloadClients" class="btn ghost sm">تحديث</button>
          <button id="btnExportClients" class="btn ghost sm">PDF</button>
        </div>
        <div id="clientsBox"></div>
      </div>
    </div>

    <div class="section card">
      <div class="title"><h2>السحب العشوائي</h2></div>
      <div class="stack">
        <button id="btnRaffle" class="btn">🎲 اسحب الآن</button>
        <div id="winnerBox"></div>
      </div>
    </div>

    <div class="footer-note">اعداد ابراهيم الناشري</div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
